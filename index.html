<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>DSA Tracker 🔥</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#fff7ed;font-family:'Inter',system-ui,sans-serif;color:#1c1917}
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-thumb{background:#fed7aa;border-radius:4px}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
  @keyframes shimmer{0%{background-position:200% center}100%{background-position:-200% center}}
  .fire-btn{animation:pulse 2s infinite}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const TOPICS = [
  { name: "Linked List", count: 14, color: "#dc2626" },
  { name: "Heap / Priority Queue", count: 12, color: "#ea580c" },
  { name: "Trees", count: 23, color: "#d97706" },
  { name: "Binary Search", count: 14, color: "#dc2626" },
  { name: "Arrays & Hashing", count: 22, color: "#ea580c" },
  { name: "Two Pointers", count: 13, color: "#d97706" },
  { name: "Sliding Window", count: 9, color: "#dc2626" },
  { name: "Stack", count: 14, color: "#ea580c" },
  { name: "Backtracking", count: 17, color: "#d97706" },
  { name: "Tries", count: 4, color: "#dc2626" },
  { name: "Graphs", count: 21, color: "#ea580c" },
  { name: "Advanced Graphs", count: 10, color: "#d97706" },
  { name: "1-D Dynamic Programming", count: 17, color: "#dc2626" },
  { name: "2-D Dynamic Programming", count: 16, color: "#ea580c" },
  { name: "Greedy", count: 14, color: "#d97706" },
  { name: "Intervals", count: 7, color: "#dc2626" },
  { name: "Math & Geometry", count: 13, color: "#ea580c" },
  { name: "Bit Manipulation", count: 10, color: "#d97706" },
];

const TOTAL_DAYS = Math.ceil(250 / 6);

const MOTTOS = [
  "Every problem you solve is a step closer to the offer. 💼",
  "The grind today = the gap tomorrow. 🚀",
  "Hard days build strong engineers. 🔨",
  "You're 1 problem ahead of yesterday's you. ⚡",
  "Consistency beats talent. Show up. 🔥",
  "The best time to start was yesterday. Now is second best. ⏱",
  "Discomfort is where growth lives. Push through. 💪",
  "Every expert was once a beginner. Keep going. 🌟",
];

function buildSchedule() {
  const schedule = {};
  const startDate = new Date("2026-04-23");
  const queue = [];
  TOPICS.forEach(t => { for (let i = 0; i < t.count; i++) queue.push({ topic: t.name, num: i + 1, color: t.color }); });
  for (let d = 1; d <= TOTAL_DAYS; d++) {
    const date = new Date(startDate);
    date.setDate(startDate.getDate() + (d - 1));
    const qs = queue.splice(0, 6);
    schedule[d] = {
      date: date.toISOString().split("T")[0],
      questions: qs.map((q, i) => ({
        id: `d${d}q${i + 1}`, label: `${q.topic} #${q.num}`,
        topic: q.topic, color: q.color,
        url: "https://neetcode.io/practice/practice/neetcode250",
      })),
    };
  }
  return schedule;
}

function buildTopicDays(schedule) {
  const map = {};
  Object.entries(schedule).forEach(([d, data]) => {
    data.questions.forEach(q => { if (!map[q.topic]) map[q.topic] = new Set(); map[q.topic].add(Number(d)); });
  });
  return map;
}

const SCHEDULE = buildSchedule();
const TOPIC_DAYS = buildTopicDays(SCHEDULE);
const START = new Date("2026-04-23");

function todayDay() {
  const diff = Math.floor((new Date() - START) / 864e5);
  return Math.min(Math.max(diff + 1, 1), TOTAL_DAYS);
}

const POMO_MODES = [
  { label: "🔥 Focus", sec: 25 * 60, color: "#ea580c" },
  { label: "😮‍💨 Short Break", sec: 5 * 60, color: "#16a34a" },
  { label: "🌿 Long Break", sec: 15 * 60, color: "#0284c7" },
];

const fmt = s => `${String(Math.floor(s / 60)).padStart(2, "0")}:${String(s % 60).padStart(2, "0")}`;
const ratingColor = ["", "#16a34a", "#65a30d", "#d97706", "#ea580c", "#dc2626"];
const ratingLabel = ["", "Very Easy", "Easy", "Medium", "Hard", "Very Hard"];

function CompleteModal({ q, existing, onSave, onClose }) {
  const [name, setName] = useState(existing?.name || "");
  const [rating, setRating] = useState(existing?.rating || 0);
  const [hover, setHover] = useState(0);
  return (
    <div style={{position:"fixed",inset:0,background:"#00000066",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:16}}>
      <div style={{background:"#fff",borderRadius:20,padding:24,width:"100%",maxWidth:360,boxShadow:"0 24px 60px #ea580c22",border:"2px solid #fed7aa"}}>
        <div style={{textAlign:"center",marginBottom:16}}>
          <div style={{fontSize:32,marginBottom:4}}>✅</div>
          <div style={{fontWeight:800,fontSize:17,color:"#1c1917"}}>Mark as Done!</div>
          <div style={{fontSize:12,color:q.color,fontWeight:600,marginTop:2}}>{q.topic} · {q.label}</div>
        </div>
        <div style={{marginBottom:14}}>
          <label style={{fontSize:13,color:"#78716c",display:"block",marginBottom:6,fontWeight:600}}>What was the question?</label>
          <input autoFocus value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Reverse Linked List"
            style={{width:"100%",padding:"10px 12px",borderRadius:10,border:"2px solid #fed7aa",background:"#fff7ed",color:"#1c1917",fontSize:14,outline:"none"}}/>
        </div>
        <div style={{marginBottom:20}}>
          <label style={{fontSize:13,color:"#78716c",display:"block",marginBottom:8,fontWeight:600}}>How hard was it?</label>
          <div style={{display:"flex",gap:8,justifyContent:"center",marginBottom:6}}>
            {[1,2,3,4,5].map(s=>(
              <span key={s} onClick={()=>setRating(s)} onMouseEnter={()=>setHover(s)} onMouseLeave={()=>setHover(0)}
                style={{fontSize:30,cursor:"pointer",transition:"transform 0.15s",transform:(hover||rating)>=s?"scale(1.25)":"scale(1)",filter:(hover||rating)>=s?"none":"grayscale(1) opacity(0.25)"}}>⭐</span>
            ))}
          </div>
          {(hover||rating)>0 && <div style={{textAlign:"center",fontSize:13,fontWeight:700,color:ratingColor[hover||rating]}}>{ratingLabel[hover||rating]}</div>}
        </div>
        <div style={{display:"flex",gap:10}}>
          <button onClick={onClose} style={{flex:1,padding:12,borderRadius:10,border:"1px solid #e7e5e4",background:"#fafaf9",color:"#78716c",fontWeight:600,cursor:"pointer",fontSize:14}}>Cancel</button>
          <button onClick={()=>onSave({name:name.trim(),rating})}
            style={{flex:2,padding:12,borderRadius:10,border:"none",background:"linear-gradient(135deg,#ea580c,#dc2626)",color:"#fff",fontWeight:800,cursor:"pointer",fontSize:14,boxShadow:"0 4px 14px #ea580c55"}}>
            🔥 Mark Complete
          </button>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [tab, setTab] = useState("today");
  const [completed, setCompleted] = useState(() => { try { return JSON.parse(localStorage.getItem("dsa_v3")||"{}"); } catch { return {}; } });
  const [modal, setModal] = useState(null);
  const [pomodoros, setPomodoros] = useState(0);
  const [modeIdx, setModeIdx] = useState(0);
  const [timeLeft, setTimeLeft] = useState(POMO_MODES[0].sec);
  const [running, setRunning] = useState(false);
  const [viewDay, setViewDay] = useState(todayDay());
  const timerRef = useRef(null);
  const audioCtx = useRef(null);
  const today = todayDay();
  const totalSolved = Object.keys(completed).length;
  const motto = MOTTOS[today % MOTTOS.length];

  useEffect(() => { localStorage.setItem("dsa_v3", JSON.stringify(completed)); }, [completed]);

  const tick = useCallback(() => {
    setTimeLeft(t => {
      if (t <= 1) { setRunning(false); playBeep(); if (modeIdx === 0) setPomodoros(p => p + 1); return POMO_MODES[modeIdx].sec; }
      return t - 1;
    });
  }, [modeIdx]);

  useEffect(() => {
    if (running) timerRef.current = setInterval(tick, 1000);
    else clearInterval(timerRef.current);
    return () => clearInterval(timerRef.current);
  }, [running, tick]);

  function setMode(i) { setModeIdx(i); setTimeLeft(POMO_MODES[i].sec); setRunning(false); }

  function playBeep() {
    try {
      if (!audioCtx.current) audioCtx.current = new (window.AudioContext || window.webkitAudioContext)();
      const o = audioCtx.current.createOscillator(), g = audioCtx.current.createGain();
      o.connect(g); g.connect(audioCtx.current.destination);
      o.frequency.value = 880;
      g.gain.setValueAtTime(0.4, audioCtx.current.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.current.currentTime + 1.2);
      o.start(); o.stop(audioCtx.current.currentTime + 1.2);
    } catch(e) {}
  }

  function handleSave(q, data) { setCompleted(c => ({ ...c, [q.id]: { ...data, ts: Date.now() } })); setModal(null); }
  function handleUnmark(id) { setCompleted(c => { const n = { ...c }; delete n[id]; return n; }); setModal(null); }

  const dayData = SCHEDULE[viewDay] || {};
  const dayQs = dayData.questions || [];
  const dayDone = dayQs.filter(q => completed[q.id]).length;
  const pct = totalSolved / 250;
  const r = 40, circ = 2 * Math.PI * r;
  const pr = 52, pcirc = 2 * Math.PI * pr;
  const pomoPct = 1 - timeLeft / POMO_MODES[modeIdx].sec;

  const tabBtn = t => ({
    flex:1, padding:"9px 0", border:"none", borderRadius:8,
    background: tab===t ? "#ea580c" : "transparent",
    color: tab===t ? "#fff" : "#a8a29e",
    fontWeight:700, cursor:"pointer", fontSize:11,
  });

  const card = (extra={}) => ({background:"#fff", borderRadius:14, border:"1px solid #fed7aa", boxShadow:"0 2px 8px #ea580c0d", ...extra});

  // streak calculation
  let streak = 0;
  for (let d = today; d >= 1; d--) {
    const qs = SCHEDULE[d]?.questions || [];
    if (qs.length > 0 && qs.every(q => completed[q.id])) streak++;
    else break;
  }

  return (
    <div style={{background:"#fff7ed",minHeight:"100vh",maxWidth:430,margin:"0 auto",paddingBottom:90}}>
      {modal && <CompleteModal q={modal} existing={completed[modal.id]} onSave={d=>handleSave(modal,d)} onClose={()=>setModal(null)}/>}

      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#ea580c 0%,#dc2626 60%,#b91c1c 100%)",padding:"18px 16px 10px",position:"sticky",top:0,zIndex:10,boxShadow:"0 4px 20px #dc262644"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{flex:1}}>
            <div style={{fontSize:21,fontWeight:900,color:"#fff",letterSpacing:-0.5}}>DSA Tracker 🔥</div>
            <div style={{fontSize:11,color:"#fecaca",marginTop:1}}>{TOTAL_DAYS} days · 6 problems/day · 250 total</div>
            {streak>0 && <div style={{marginTop:5,display:"inline-flex",alignItems:"center",gap:5,background:"#ffffff25",borderRadius:20,padding:"3px 10px"}}>
              <span style={{fontSize:13}}>🔥</span>
              <span style={{fontSize:12,color:"#fff",fontWeight:700}}>{streak} day streak!</span>
            </div>}
          </div>
          <div style={{textAlign:"center",marginLeft:8}}>
            <svg width={68} height={68} viewBox="0 0 100 100">
              <circle cx={50} cy={50} r={r} fill="none" stroke="#ffffff25" strokeWidth={10}/>
              <circle cx={50} cy={50} r={r} fill="none" stroke="#fbbf24" strokeWidth={10}
                strokeDasharray={circ} strokeDashoffset={circ*(1-pct)} strokeLinecap="round" transform="rotate(-90 50 50)"/>
              <text x={50} y={47} textAnchor="middle" fill="#fff" fontSize={16} fontWeight={900}>{totalSolved}</text>
              <text x={50} y={62} textAnchor="middle" fill="#fecaca" fontSize={10}>/ 250</text>
            </svg>
            <div style={{fontSize:10,color:"#fecaca",marginTop:-2,fontWeight:700}}>{Math.round(pct*100)}% done</div>
          </div>
        </div>
        <div style={{display:"flex",gap:4,marginTop:10,background:"#00000020",borderRadius:10,padding:4}}>
          {["today","schedule","pomodoro","stats"].map(t=>(
            <button key={t} style={tabBtn(t)} onClick={()=>setTab(t)}>
              {t==="today"?"📋 Today":t==="schedule"?"📅 Plan":t==="pomodoro"?"🍅 Pomo":"📊 Stats"}
            </button>
          ))}
        </div>
      </div>

      <div style={{padding:14}}>

        {/* TODAY */}
        {tab==="today" && (
          <div>
            {/* Motivational banner */}
            <div style={{background:"linear-gradient(135deg,#fef3c7,#fde68a)",borderRadius:12,padding:"10px 14px",marginBottom:12,border:"1px solid #fbbf24",display:"flex",gap:10,alignItems:"center"}}>
              <span style={{fontSize:20}}>💡</span>
              <span style={{fontSize:12,color:"#92400e",fontWeight:600,lineHeight:1.4}}>{motto}</span>
            </div>

            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div>
                <div style={{fontWeight:800,fontSize:18,color:"#1c1917"}}>Day {viewDay} <span style={{color:"#a8a29e",fontSize:14,fontWeight:500}}>of {TOTAL_DAYS}</span></div>
                <div style={{color:"#a8a29e",fontSize:12}}>{dayData.date}</div>
              </div>
              <div style={{background:dayDone===dayQs.length&&dayQs.length>0?"#fef9c3":"#fff",border:`2px solid ${dayDone===dayQs.length&&dayQs.length>0?"#fbbf24":"#fed7aa"}`,borderRadius:10,padding:"6px 14px",fontSize:13,fontWeight:700,color:dayDone===dayQs.length&&dayQs.length>0?"#d97706":"#ea580c"}}>
                {dayDone}/{dayQs.length} 🔥
              </div>
            </div>

            {/* Progress bar for day */}
            <div style={{height:6,background:"#fee2e2",borderRadius:6,overflow:"hidden",marginBottom:12}}>
              <div style={{height:"100%",width:`${dayQs.length?dayDone/dayQs.length*100:0}%`,background:"linear-gradient(90deg,#f97316,#dc2626)",borderRadius:6,transition:"width 0.4s"}}/>
            </div>

            <div style={{display:"flex",gap:8,marginBottom:12}}>
              {[["← Prev",()=>setViewDay(d=>Math.max(1,d-1))],["Today",()=>setViewDay(today)],["Next →",()=>setViewDay(d=>Math.min(TOTAL_DAYS,d+1))]].map(([lbl,fn],i)=>(
                <button key={lbl} onClick={fn} style={{flex:1,...card(),padding:9,cursor:"pointer",color:i===1?"#ea580c":"#57534e",fontWeight:i===1?800:500,fontSize:13,border:i===1?"2px solid #ea580c":"1px solid #fed7aa"}}>{lbl}</button>
              ))}
            </div>

            {dayQs.map((q,qi) => {
              const done = completed[q.id];
              return (
                <div key={q.id} style={{...card({marginBottom:8}),background:done?"#fffbeb":"#fff",border:`1px solid ${done?"#fbbf24":"#fed7aa"}`}}>
                  <div style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px"}}>
                    <div onClick={()=>setModal(q)} style={{width:26,height:26,borderRadius:7,background:done?"linear-gradient(135deg,#f97316,#dc2626)":"#fff",border:`2px solid ${done?"#dc2626":"#fed7aa"}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,cursor:"pointer",boxShadow:done?"0 2px 8px #dc262644":"none",fontSize:13}}>
                      {done ? "✓" : <span style={{color:"#fca5a5",fontWeight:700,fontSize:11}}>{qi+1}</span>}
                    </div>
                    <div style={{flex:1,cursor:"pointer"}} onClick={()=>setModal(q)}>
                      <div style={{fontSize:14,fontWeight:700,color:done?"#92400e":"#1c1917",textDecoration:done?"line-through":"none"}}>
                        {done?.name ? done.name : q.label}
                      </div>
                      {done?.name && <div style={{fontSize:11,color:"#a8a29e",marginTop:1}}>{q.label}</div>}
                      <div style={{fontSize:11,color:q.color,marginTop:2,fontWeight:700}}>{q.topic}</div>
                    </div>
                    <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
                      <a href={q.url} target="_blank" rel="noreferrer" style={{color:"#ea580c",fontSize:12,textDecoration:"none",background:"#fff7ed",padding:"4px 10px",borderRadius:6,border:"1px solid #fed7aa",fontWeight:700}}>Open ↗</a>
                      {done?.rating>0 && <div style={{fontSize:10,color:ratingColor[done.rating],fontWeight:700}}>{"⭐".repeat(done.rating)}</div>}
                    </div>
                  </div>
                  {done && (
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 14px",borderTop:"1px solid #fef3c7",background:"#fffbeb",borderRadius:"0 0 14px 14px"}}>
                      {done.rating>0 ? <span style={{fontSize:11,color:ratingColor[done.rating],fontWeight:700}}>{ratingLabel[done.rating]}</span> : <span style={{fontSize:11,color:"#a8a29e"}}>No rating</span>}
                      <button onClick={()=>setModal(q)} style={{fontSize:11,color:"#ea580c",background:"transparent",border:"none",cursor:"pointer",fontWeight:700}}>Edit ✏️</button>
                      <button onClick={()=>handleUnmark(q.id)} style={{fontSize:11,color:"#dc2626",background:"transparent",border:"none",cursor:"pointer",fontWeight:700}}>Unmark ✕</button>
                    </div>
                  )}
                </div>
              );
            })}
            {dayDone===dayQs.length&&dayQs.length>0 && (
              <div style={{textAlign:"center",padding:18,background:"linear-gradient(135deg,#fef9c3,#fef3c7)",borderRadius:14,border:"2px solid #fbbf24",color:"#92400e",fontWeight:800,fontSize:17,marginTop:4}}>
                🎉 Day Crushed! Keep the streak alive! 🔥
              </div>
            )}
          </div>
        )}

        {/* SCHEDULE */}
        {tab==="schedule" && (
          <div>
            <div style={{fontWeight:800,fontSize:17,color:"#1c1917",marginBottom:2}}>Your Battle Plan 🗓</div>
            <div style={{fontSize:12,color:"#a8a29e",marginBottom:14}}>6 questions/day · {TOTAL_DAYS} days · all 250 covered</div>
            {TOPICS.map((t,idx) => {
              const days = TOPIC_DAYS[t.name] ? [...TOPIC_DAYS[t.name]].sort((a,b)=>a-b) : [];
              const dayRange = days.length ? `Days ${days[0]}–${days[days.length-1]}` : "—";
              const topicQIds = days.flatMap(d=>(SCHEDULE[d]?.questions||[]).filter(q=>q.topic===t.name).map(q=>q.id));
              const solvedCount = topicQIds.filter(id=>completed[id]).length;
              const topicPct = solvedCount/t.count;
              return (
                <div key={t.name} style={{...card({marginBottom:8,padding:"12px 14px"})}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div style={{flex:1}}>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <span style={{fontSize:11,color:"#a8a29e",fontWeight:800,background:"#fff7ed",borderRadius:6,padding:"2px 7px",border:"1px solid #fed7aa"}}>#{idx+1}</span>
                        <span style={{fontWeight:700,fontSize:14,color:"#1c1917"}}>{t.name}</span>
                      </div>
                      <div style={{fontSize:11,color:"#a8a29e",marginTop:3}}>{t.count} questions · {dayRange}</div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:12,fontWeight:800,color:t.color}}>{solvedCount}/{t.count}</div>
                      {topicPct===1 && <div style={{fontSize:10,color:"#16a34a",fontWeight:700}}>✅ Done!</div>}
                    </div>
                  </div>
                  <div style={{marginTop:8,height:5,background:"#fff7ed",borderRadius:4,overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${topicPct*100}%`,background:`linear-gradient(90deg,${t.color}cc,${t.color})`,borderRadius:4,transition:"width 0.4s"}}/>
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* POMODORO */}
        {tab==="pomodoro" && (
          <div style={{textAlign:"center"}}>
            <div style={{fontWeight:800,fontSize:17,color:"#1c1917",marginBottom:4}}>Focus Mode 🍅</div>
            <div style={{fontSize:12,color:"#a8a29e",marginBottom:16}}>Lock in. No distractions. Just you and the problem.</div>
            <div style={{display:"flex",gap:8,justifyContent:"center",marginBottom:20}}>
              {POMO_MODES.map((m,i)=>(
                <button key={i} onClick={()=>setMode(i)} style={{padding:"7px 12px",borderRadius:8,border:`2px solid ${modeIdx===i?m.color:"#fed7aa"}`,background:modeIdx===i?m.color+"18":"#fff",color:modeIdx===i?m.color:"#a8a29e",cursor:"pointer",fontSize:11,fontWeight:700}}>{m.label}</button>
              ))}
            </div>
            <div style={{...card({display:"inline-block",padding:"28px 36px",marginBottom:20,border:"2px solid #fed7aa"})}}>
              <svg width={160} height={160} viewBox="0 0 130 130">
                <circle cx={65} cy={65} r={pr} fill="none" stroke="#fff7ed" strokeWidth={11}/>
                <circle cx={65} cy={65} r={pr} fill="none" stroke={POMO_MODES[modeIdx].color} strokeWidth={11}
                  strokeDasharray={pcirc} strokeDashoffset={pcirc*(1-pomoPct)} strokeLinecap="round" transform="rotate(-90 65 65)" style={{transition:"stroke-dashoffset 0.5s"}}/>
                <text x={65} y={58} textAnchor="middle" fill="#1c1917" fontSize={28} fontWeight={900}>{fmt(timeLeft)}</text>
                <text x={65} y={76} textAnchor="middle" fill="#a8a29e" fontSize={10}>{POMO_MODES[modeIdx].label}</text>
              </svg>
            </div>
            <div style={{display:"flex",gap:12,justifyContent:"center",marginBottom:18}}>
              <button className={running?"":"fire-btn"} onClick={()=>setRunning(r=>!r)}
                style={{padding:"13px 36px",borderRadius:12,border:"none",background:running?"#fee2e2":`linear-gradient(135deg,${POMO_MODES[modeIdx].color},#dc2626)`,
                color:running?"#dc2626":"#fff",fontSize:16,fontWeight:900,cursor:"pointer",
                boxShadow:running?"none":`0 6px 20px ${POMO_MODES[modeIdx].color}55`}}>
                {running?"⏸ Pause":"▶ Let's Go!"}
              </button>
              <button onClick={()=>{setRunning(false);setTimeLeft(POMO_MODES[modeIdx].sec);}} style={{padding:"13px 18px",borderRadius:12,border:"2px solid #fed7aa",background:"#fff",color:"#a8a29e",fontSize:16,cursor:"pointer"}}>↺</button>
            </div>
            <div style={{...card({padding:14,marginBottom:12})}}>
              <div style={{fontSize:13,color:"#78716c",marginBottom:6,fontWeight:600}}>Today's Pomodoros</div>
              <div style={{display:"flex",gap:6,justifyContent:"center",flexWrap:"wrap",marginBottom:6}}>
                {Array.from({length:Math.max(pomodoros,4)},(_,i)=>(
                  <span key={i} style={{fontSize:24}}>{i<pomodoros?"🍅":"⭕"}</span>
                ))}
              </div>
              <div style={{fontSize:12,color:"#ea580c",fontWeight:700}}>{pomodoros} pomodoros · ~{pomodoros*25} min of deep work</div>
            </div>
            <div style={{...card({padding:14,textAlign:"left"})}}>
              <div style={{color:"#ea580c",fontWeight:800,marginBottom:8,fontSize:13}}>⚡ Power Routine</div>
              {["🔥 Pomo 1–2 → Crush Q1–Q3","😮‍💨 5 min break — stretch, breathe","🔥 Pomo 3–4 → Finish Q4–Q6","🏆 Long break — you've earned it!"].map((s,i)=>(
                <div key={i} style={{fontSize:12,color:"#78716c",marginTop:i?6:0,display:"flex",gap:6}}><span>{s}</span></div>
              ))}
            </div>
          </div>
        )}

        {/* STATS */}
        {tab==="stats" && (
          <div>
            <div style={{fontWeight:800,fontSize:17,color:"#1c1917",marginBottom:14}}>Your Progress 📊</div>

            {/* Big progress card */}
            <div style={{background:"linear-gradient(135deg,#ea580c,#dc2626)",borderRadius:16,padding:"18px 18px 14px",marginBottom:14,boxShadow:"0 6px 24px #dc262644"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <div>
                  <div style={{fontSize:13,color:"#fecaca",fontWeight:600}}>Overall Progress</div>
                  <div style={{fontSize:32,fontWeight:900,color:"#fff"}}>{totalSolved}<span style={{fontSize:16,color:"#fecaca",fontWeight:600}}> / 250</span></div>
                </div>
                <div style={{fontSize:44,fontWeight:900,color:"#ffffff40"}}>{Math.round(pct*100)}%</div>
              </div>
              <div style={{height:8,background:"#ffffff30",borderRadius:6,overflow:"hidden"}}>
                <div style={{height:"100%",width:`${pct*100}%`,background:"#fbbf24",borderRadius:6,transition:"width 0.4s"}}/>
              </div>
              <div style={{marginTop:8,fontSize:11,color:"#fecaca"}}>{250-totalSolved} questions left — you got this! 💪</div>
            </div>

            {[
              ["📅 Days Elapsed", `${today} / ${TOTAL_DAYS}`],
              ["🎯 On Track", totalSolved >= today*6 ? "✅ Crushing it!" : "⚠️ Time to catch up!"],
              ["⚡ Today's Progress", `${SCHEDULE[today]?.questions.filter(q=>completed[q.id]).length||0} / 6`],
              ["🔥 Current Streak", `${streak} day${streak!==1?"s":""}`],
              ["🏁 Est. Finish", (() => { const d = new Date(); d.setDate(d.getDate()+Math.ceil((250-totalSolved)/6)); return d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}); })()],
            ].map(([k,v])=>(
              <div key={k} style={{display:"flex",justifyContent:"space-between",padding:"11px 4px",borderBottom:"1px solid #fef3c7",fontSize:13}}>
                <span style={{color:"#78716c",fontWeight:600}}>{k}</span>
                <span style={{color:"#1c1917",fontWeight:800}}>{v}</span>
              </div>
            ))}

            {/* Heatmap */}
            <div style={{fontWeight:800,fontSize:15,margin:"20px 0 10px",color:"#1c1917"}}>Activity Heatmap 🗓</div>
            <div style={{...card({padding:14,marginBottom:14,overflowX:"auto"})}}>
              <div style={{display:"flex",gap:3,marginBottom:6}}>
                {["S","M","T","W","T","F","S"].map((d,i)=>(
                  <div key={i} style={{width:28,textAlign:"center",fontSize:9,color:"#a8a29e",fontWeight:700}}>{d}</div>
                ))}
              </div>
              {(() => {
                const startDow = START.getDay();
                const cells = [];
                for(let i=0;i<startDow;i++) cells.push(null);
                for(let d=1;d<=TOTAL_DAYS;d++){
                  const dqs=SCHEDULE[d]?.questions||[];
                  const solved=dqs.filter(q=>completed[q.id]).length;
                  cells.push({d,solved,total:dqs.length,date:SCHEDULE[d]?.date});
                }
                while(cells.length%7!==0) cells.push(null);
                const rows=[];
                for(let i=0;i<cells.length;i+=7) rows.push(cells.slice(i,i+7));

                const cellColor=(solved,total)=>{
                  if(!total) return "#fafaf9";
                  const r=solved/total;
                  if(r===0) return "#fff7ed";
                  if(r<=0.33) return "#fed7aa";
                  if(r<=0.66) return "#fb923c";
                  if(r<1) return "#ea580c";
                  return "#16a34a";
                };
                const txtColor=(solved,total)=>{
                  if(!total||solved===0) return "#e7e5e4";
                  return solved/total>=0.5?"#fff":"#7c2d12";
                };

                return (
                  <div>
                    {rows.map((row,ri)=>(
                      <div key={ri} style={{display:"flex",gap:3,marginBottom:3}}>
                        {row.map((cell,ci)=>(
                          <div key={ci} title={cell?`Day ${cell.d}: ${cell.solved}/${cell.total}`:""}
                            style={{width:28,height:28,borderRadius:5,background:cell?cellColor(cell.solved,cell.total):"transparent",
                              border:cell&&cell.d===today?"2px solid #ea580c":"1px solid #fed7aa",
                              display:"flex",alignItems:"center",justifyContent:"center",
                              fontSize:8,color:cell?txtColor(cell.solved,cell.total):"transparent",
                              fontWeight:700,cursor:cell?"pointer":"default"}}
                            onClick={()=>{if(cell){setViewDay(cell.d);setTab("today");}}}>
                            {cell?cell.d:""}
                          </div>
                        ))}
                      </div>
                    ))}
                    <div style={{display:"flex",gap:6,marginTop:10,alignItems:"center",flexWrap:"wrap"}}>
                      <span style={{fontSize:10,color:"#a8a29e"}}>Less</span>
                      {["#fff7ed","#fed7aa","#fb923c","#ea580c","#16a34a"].map((c,i)=>(
                        <div key={i} style={{width:14,height:14,borderRadius:3,background:c,border:"1px solid #fed7aa"}}/>
                      ))}
                      <span style={{fontSize:10,color:"#a8a29e"}}>More · 🟩 Complete</span>
                    </div>
                  </div>
                );
              })()}
            </div>

            {/* Per-topic */}
            <div style={{fontWeight:800,fontSize:15,marginBottom:10,color:"#1c1917"}}>By Topic</div>
            {TOPICS.map(t => {
              const days=TOPIC_DAYS[t.name]?[...TOPIC_DAYS[t.name]].sort((a,b)=>a-b):[];
              const topicQIds=days.flatMap(d=>(SCHEDULE[d]?.questions||[]).filter(q=>q.topic===t.name).map(q=>q.id));
              const solvedCount=topicQIds.filter(id=>completed[id]).length;
              const tp=solvedCount/t.count;
              return (
                <div key={t.name} style={{...card({padding:"10px 14px",marginBottom:8,background:tp===1?"#f0fdf4":"#fff",border:tp===1?"1px solid #bbf7d0":"1px solid #fed7aa"})}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                    <span style={{fontSize:13,color:"#1c1917",fontWeight:700}}>{tp===1?"✅ ":""}{t.name}</span>
                    <span style={{fontSize:12,color:tp===1?"#16a34a":t.color,fontWeight:800}}>{solvedCount}/{t.count}</span>
                  </div>
                  <div style={{height:5,background:"#fff7ed",borderRadius:4,overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${tp*100}%`,background:tp===1?"#16a34a":`linear-gradient(90deg,#f97316,#dc2626)`,borderRadius:4,transition:"width 0.4s"}}/>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
