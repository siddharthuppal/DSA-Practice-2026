<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>DSA Tracker 🦄</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0f172a;font-family:'Inter',system-ui,sans-serif;color:#e2e8f0}
  input[type=time]::-webkit-calendar-picker-indicator{filter:invert(1)}
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-thumb{background:#334155;border-radius:4px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const TOPICS = [
  { name: "Linked List", count: 14, color: "#0ea5e9" },
  { name: "Heap / Priority Queue", count: 12, color: "#22c55e" },
  { name: "Trees", count: 23, color: "#eab308" },
  { name: "Binary Search", count: 14, color: "#f43f5e" },
  { name: "Arrays & Hashing", count: 22, color: "#6366f1" },
  { name: "Two Pointers", count: 13, color: "#8b5cf6" },
  { name: "Sliding Window", count: 9, color: "#a78bfa" },
  { name: "Stack", count: 14, color: "#ec4899" },
  { name: "Backtracking", count: 17, color: "#10b981" },
  { name: "Tries", count: 4, color: "#14b8a6" },
  { name: "Graphs", count: 21, color: "#3b82f6" },
  { name: "Advanced Graphs", count: 10, color: "#6366f1" },
  { name: "1-D Dynamic Programming", count: 17, color: "#a855f7" },
  { name: "2-D Dynamic Programming", count: 16, color: "#8b5cf6" },
  { name: "Greedy", count: 14, color: "#d946ef" },
  { name: "Intervals", count: 7, color: "#f43f5e" },
  { name: "Math & Geometry", count: 13, color: "#fb923c" },
  { name: "Bit Manipulation", count: 10, color: "#f97316" },
];

const TOTAL_DAYS = Math.ceil(250 / 6);

function buildSchedule() {
  const schedule = {};
  const startDate = new Date("2026-04-23");
  const queue = [];
  TOPICS.forEach(t => { for (let i = 0; i < t.count; i++) queue.push({ topic: t.name, num: i + 1, color: t.color }); });
  for (let d = 1; d <= TOTAL_DAYS; d++) {
    const date = new Date(startDate);
    date.setDate(startDate.getDate() + (d - 1));
    const qs = queue.splice(0, 6);
    schedule[d] = {
      date: date.toISOString().split("T")[0],
      questions: qs.map((q, i) => ({
        id: `d${d}q${i + 1}`, label: `${q.topic} #${q.num}`,
        topic: q.topic, color: q.color,
        url: "https://neetcode.io/practice/practice/neetcode250",
      })),
    };
  }
  return schedule;
}

function buildTopicDays(schedule) {
  const map = {};
  Object.entries(schedule).forEach(([d, data]) => {
    data.questions.forEach(q => { if (!map[q.topic]) map[q.topic] = new Set(); map[q.topic].add(Number(d)); });
  });
  return map;
}

const SCHEDULE = buildSchedule();
const TOPIC_DAYS = buildTopicDays(SCHEDULE);
const START = new Date("2026-04-23");

function todayDay() {
  const diff = Math.floor((new Date() - START) / 864e5);
  return Math.min(Math.max(diff + 1, 1), TOTAL_DAYS);
}

const POMO_MODES = [
  { label: "Focus", sec: 25 * 60, color: "#6366f1" },
  { label: "Short Break", sec: 5 * 60, color: "#22c55e" },
  { label: "Long Break", sec: 15 * 60, color: "#f97316" },
];

const fmt = s => `${String(Math.floor(s / 60)).padStart(2, "0")}:${String(s % 60).padStart(2, "0")}`;
const ratingColor = ["", "#22c55e", "#84cc16", "#eab308", "#f97316", "#ef4444"];
const ratingLabel = ["", "Very Easy", "Easy", "Medium", "Hard", "Very Hard"];

function CompleteModal({ q, existing, onSave, onClose }) {
  const [name, setName] = useState(existing?.name || "");
  const [rating, setRating] = useState(existing?.rating || 0);
  const [hover, setHover] = useState(0);
  return (
    <div style={{position:"fixed",inset:0,background:"#000000cc",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:16}}>
      <div style={{background:"#1e293b",borderRadius:16,padding:24,width:"100%",maxWidth:360,border:"1px solid #334155"}}>
        <div style={{fontWeight:700,fontSize:16,color:"#fff",marginBottom:4}}>{q.label}</div>
        <div style={{fontSize:12,color:q.color,marginBottom:20}}>{q.topic}</div>
        <div style={{marginBottom:16}}>
          <label style={{fontSize:13,color:"#94a3b8",display:"block",marginBottom:6}}>Question name (optional)</label>
          <input autoFocus value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Reverse Linked List"
            style={{width:"100%",padding:"10px 12px",borderRadius:8,border:"1px solid #334155",background:"#0f172a",color:"#fff",fontSize:14,outline:"none"}}/>
        </div>
        <div style={{marginBottom:24}}>
          <label style={{fontSize:13,color:"#94a3b8",display:"block",marginBottom:8}}>Difficulty rating</label>
          <div style={{display:"flex",gap:8,justifyContent:"center",marginBottom:6}}>
            {[1,2,3,4,5].map(s=>(
              <span key={s} onClick={()=>setRating(s)} onMouseEnter={()=>setHover(s)} onMouseLeave={()=>setHover(0)}
                style={{fontSize:32,cursor:"pointer",transition:"transform 0.1s",transform:(hover||rating)>=s?"scale(1.2)":"scale(1)",filter:(hover||rating)>=s?"none":"grayscale(1) opacity(0.3)"}}>⭐</span>
            ))}
          </div>
          {(hover||rating)>0 && <div style={{textAlign:"center",fontSize:12,fontWeight:600,color:ratingColor[hover||rating]}}>{ratingLabel[hover||rating]}</div>}
        </div>
        <div style={{display:"flex",gap:10}}>
          <button onClick={onClose} style={{flex:1,padding:12,borderRadius:10,border:"1px solid #334155",background:"#0f172a",color:"#94a3b8",fontWeight:600,cursor:"pointer",fontSize:14}}>Cancel</button>
          <button onClick={()=>onSave({name:name.trim(),rating})} style={{flex:2,padding:12,borderRadius:10,border:"none",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",color:"#fff",fontWeight:700,cursor:"pointer",fontSize:14}}>✓ Mark Complete</button>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [tab, setTab] = useState("today");
  const [completed, setCompleted] = useState(() => { try { return JSON.parse(localStorage.getItem("dsa_v3")||"{}"); } catch { return {}; } });
  const [modal, setModal] = useState(null);
  const [pomodoros, setPomodoros] = useState(0);
  const [modeIdx, setModeIdx] = useState(0);
  const [timeLeft, setTimeLeft] = useState(POMO_MODES[0].sec);
  const [running, setRunning] = useState(false);
  const [viewDay, setViewDay] = useState(todayDay());
  const timerRef = useRef(null);
  const audioCtx = useRef(null);
  const today = todayDay();
  const totalSolved = Object.keys(completed).length;

  useEffect(() => { localStorage.setItem("dsa_v3", JSON.stringify(completed)); }, [completed]);

  const tick = useCallback(() => {
    setTimeLeft(t => {
      if (t <= 1) { setRunning(false); playBeep(); if (modeIdx === 0) setPomodoros(p => p + 1); return POMO_MODES[modeIdx].sec; }
      return t - 1;
    });
  }, [modeIdx]);

  useEffect(() => {
    if (running) timerRef.current = setInterval(tick, 1000);
    else clearInterval(timerRef.current);
    return () => clearInterval(timerRef.current);
  }, [running, tick]);

  function setMode(i) { setModeIdx(i); setTimeLeft(POMO_MODES[i].sec); setRunning(false); }

  function playBeep() {
    try {
      if (!audioCtx.current) audioCtx.current = new (window.AudioContext || window.webkitAudioContext)();
      const o = audioCtx.current.createOscillator(), g = audioCtx.current.createGain();
      o.connect(g); g.connect(audioCtx.current.destination);
      o.frequency.value = 880;
      g.gain.setValueAtTime(0.3, audioCtx.current.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.current.currentTime + 1);
      o.start(); o.stop(audioCtx.current.currentTime + 1);
    } catch(e) {}
  }

  function handleSave(q, data) { setCompleted(c => ({ ...c, [q.id]: { ...data, ts: Date.now() } })); setModal(null); }
  function handleUnmark(id) { setCompleted(c => { const n = { ...c }; delete n[id]; return n; }); setModal(null); }

  const dayData = SCHEDULE[viewDay] || {};
  const dayQs = dayData.questions || [];
  const dayDone = dayQs.filter(q => completed[q.id]).length;
  const pct = totalSolved / 250;
  const r = 42, circ = 2 * Math.PI * r;
  const pr = 54, pcirc = 2 * Math.PI * pr;
  const pomoPct = 1 - timeLeft / POMO_MODES[modeIdx].sec;

  const tabBtn = t => ({
    flex:1, padding:"9px 0", border:"none", borderRadius:8,
    background: tab===t ? "#6366f1" : "transparent",
    color: tab===t ? "#fff" : "#94a3b8", fontWeight:600, cursor:"pointer", fontSize:12,
  });

  return (
    <div style={{background:"#0f172a",minHeight:"100vh",maxWidth:430,margin:"0 auto",paddingBottom:80}}>
      {modal && <CompleteModal q={modal} existing={completed[modal.id]} onSave={d=>handleSave(modal,d)} onClose={()=>setModal(null)}/>}

      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#1e1b4b,#0f172a)",padding:"20px 16px 12px",borderBottom:"1px solid #1e293b",position:"sticky",top:0,zIndex:10}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:20,fontWeight:800,color:"#fff"}}>DSA Tracker 🦄</div>
            <div style={{fontSize:12,color:"#64748b"}}>NeetCode 250 · {TOTAL_DAYS} Days · 6/day</div>
          </div>
          <div style={{textAlign:"center"}}>
            <svg width={60} height={60} viewBox="0 0 100 100">
              <circle cx={50} cy={50} r={r} fill="none" stroke="#1e293b" strokeWidth={10}/>
              <circle cx={50} cy={50} r={r} fill="none" stroke="#6366f1" strokeWidth={10}
                strokeDasharray={circ} strokeDashoffset={circ*(1-pct)} strokeLinecap="round" transform="rotate(-90 50 50)"/>
              <text x={50} y={55} textAnchor="middle" fill="#fff" fontSize={18} fontWeight={700}>{totalSolved}</text>
            </svg>
            <div style={{fontSize:10,color:"#64748b",marginTop:-4}}>/ 250</div>
          </div>
        </div>
        <div style={{display:"flex",gap:4,marginTop:12}}>
          {["today","schedule","pomodoro","stats"].map(t=>(
            <button key={t} style={tabBtn(t)} onClick={()=>setTab(t)}>
              {t==="today"?"📋 Today":t==="schedule"?"📅 Plan":t==="pomodoro"?"🍅 Pomo":"📊 Stats"}
            </button>
          ))}
        </div>
      </div>

      <div style={{padding:16}}>

        {/* TODAY */}
        {tab==="today" && (
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <div>
                <div style={{fontWeight:700,fontSize:17}}>Day {viewDay} of {TOTAL_DAYS}</div>
                <div style={{color:"#64748b",fontSize:12}}>{dayData.date}</div>
              </div>
              <div style={{background:dayDone===dayQs.length&&dayQs.length>0?"#16a34a22":"#1e293b",border:`1px solid ${dayDone===dayQs.length&&dayQs.length>0?"#16a34a":"#334155"}`,borderRadius:8,padding:"6px 12px",fontSize:13,color:dayDone===dayQs.length&&dayQs.length>0?"#4ade80":"#94a3b8"}}>
                {dayDone}/{dayQs.length} done
              </div>
            </div>
            <div style={{display:"flex",gap:8,marginBottom:14}}>
              <button onClick={()=>setViewDay(d=>Math.max(1,d-1))} style={{flex:1,background:"#1e293b",border:"1px solid #334155",color:"#94a3b8",borderRadius:8,padding:8,cursor:"pointer"}}>← Prev</button>
              <button onClick={()=>setViewDay(today)} style={{flex:1,background:"#6366f122",border:"1px solid #6366f1",color:"#a5b4fc",borderRadius:8,padding:8,cursor:"pointer",fontWeight:600}}>Today</button>
              <button onClick={()=>setViewDay(d=>Math.min(TOTAL_DAYS,d+1))} style={{flex:1,background:"#1e293b",border:"1px solid #334155",color:"#94a3b8",borderRadius:8,padding:8,cursor:"pointer"}}>Next →</button>
            </div>
            {dayQs.map(q => {
              const done = completed[q.id];
              return (
                <div key={q.id} style={{background:done?"#16a34a18":"#1e293b",border:`1px solid ${done?"#16a34a":"#334155"}`,borderRadius:10,padding:"12px 14px",marginBottom:8}}>
                  <div style={{display:"flex",alignItems:"center",gap:12}}>
                    <div onClick={()=>setModal(q)} style={{width:22,height:22,borderRadius:6,background:done?"#16a34a":"transparent",border:`2px solid ${done?"#16a34a":q.color}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,cursor:"pointer"}}>
                      {done && <span style={{color:"#fff",fontSize:13}}>✓</span>}
                    </div>
                    <div style={{flex:1,cursor:"pointer"}} onClick={()=>setModal(q)}>
                      <div style={{fontSize:14,fontWeight:600,color:done?"#86efac":"#e2e8f0",textDecoration:done?"line-through":"none"}}>
                        {done?.name ? done.name : q.label}
                      </div>
                      {done?.name && <div style={{fontSize:11,color:"#64748b",marginTop:1}}>{q.label}</div>}
                      <div style={{fontSize:11,color:q.color,marginTop:2}}>{q.topic}</div>
                    </div>
                    <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
                      <a href={q.url} target="_blank" rel="noreferrer" style={{color:"#6366f1",fontSize:12,textDecoration:"none",background:"#1e1b4b",padding:"4px 8px",borderRadius:6,border:"1px solid #6366f1"}}>Open</a>
                      {done?.rating>0 && <div style={{fontSize:10,color:ratingColor[done.rating],fontWeight:600}}>{"⭐".repeat(done.rating)}</div>}
                    </div>
                  </div>
                  {done && (
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:8,paddingTop:8,borderTop:"1px solid #1e293b"}}>
                      {done.rating>0 ? <span style={{fontSize:11,color:ratingColor[done.rating],fontWeight:600}}>{ratingLabel[done.rating]}</span> : <span style={{fontSize:11,color:"#64748b"}}>No rating</span>}
                      <button onClick={()=>setModal(q)} style={{fontSize:11,color:"#6366f1",background:"transparent",border:"none",cursor:"pointer"}}>Edit ✏️</button>
                      <button onClick={()=>handleUnmark(q.id)} style={{fontSize:11,color:"#ef4444",background:"transparent",border:"none",cursor:"pointer"}}>Unmark ✕</button>
                    </div>
                  )}
                </div>
              );
            })}
            {dayDone===dayQs.length&&dayQs.length>0 && (
              <div style={{textAlign:"center",padding:16,background:"#16a34a22",borderRadius:10,border:"1px solid #16a34a",color:"#4ade80",fontWeight:700,fontSize:16}}>🎉 Day Complete!</div>
            )}
          </div>
        )}

        {/* SCHEDULE */}
        {tab==="schedule" && (
          <div>
            <div style={{fontWeight:700,fontSize:17,marginBottom:4}}>Schedule ({TOTAL_DAYS} Days)</div>
            <div style={{fontSize:12,color:"#64748b",marginBottom:14}}>6 questions/day · all 250 covered</div>
            {TOPICS.map((t,idx) => {
              const days = TOPIC_DAYS[t.name] ? [...TOPIC_DAYS[t.name]].sort((a,b)=>a-b) : [];
              const dayRange = days.length ? `Days ${days[0]}–${days[days.length-1]}` : "—";
              return (
                <div key={t.name} style={{background:"#1e293b",border:"1px solid #334155",borderRadius:10,padding:"12px 14px",marginBottom:8}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <span style={{fontSize:11,color:"#64748b",fontWeight:700,background:"#0f172a",borderRadius:4,padding:"2px 6px"}}>#{idx+1}</span>
                        <span style={{fontWeight:600,fontSize:14,color:"#fff"}}>{t.name}</span>
                      </div>
                      <div style={{fontSize:11,color:"#64748b",marginTop:3}}>{t.count} questions · {dayRange}</div>
                    </div>
                    <div style={{width:36,height:36,borderRadius:"50%",background:t.color+"33",border:`2px solid ${t.color}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:t.color}}>{t.count}</div>
                  </div>
                  <div style={{marginTop:8,height:4,background:"#0f172a",borderRadius:4,overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${(days.length/TOTAL_DAYS)*100}%`,background:t.color,borderRadius:4}}/>
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* POMODORO */}
        {tab==="pomodoro" && (
          <div style={{textAlign:"center"}}>
            <div style={{fontWeight:700,fontSize:17,marginBottom:16}}>Pomodoro Timer</div>
            <div style={{display:"flex",gap:8,justifyContent:"center",marginBottom:24}}>
              {POMO_MODES.map((m,i)=>(
                <button key={i} onClick={()=>setMode(i)} style={{padding:"7px 14px",borderRadius:8,border:`1px solid ${modeIdx===i?m.color:"#334155"}`,background:modeIdx===i?m.color+"22":"#1e293b",color:modeIdx===i?m.color:"#94a3b8",cursor:"pointer",fontSize:12,fontWeight:600}}>{m.label}</button>
              ))}
            </div>
            <svg width={160} height={160} viewBox="0 0 130 130" style={{margin:"0 auto",display:"block"}}>
              <circle cx={65} cy={65} r={pr} fill="none" stroke="#1e293b" strokeWidth={10}/>
              <circle cx={65} cy={65} r={pr} fill="none" stroke={POMO_MODES[modeIdx].color} strokeWidth={10}
                strokeDasharray={pcirc} strokeDashoffset={pcirc*(1-pomoPct)} strokeLinecap="round" transform="rotate(-90 65 65)" style={{transition:"stroke-dashoffset 0.5s"}}/>
              <text x={65} y={60} textAnchor="middle" fill="#fff" fontSize={26} fontWeight={800}>{fmt(timeLeft)}</text>
              <text x={65} y={78} textAnchor="middle" fill="#64748b" fontSize={11}>{POMO_MODES[modeIdx].label}</text>
            </svg>
            <div style={{marginTop:24,display:"flex",gap:12,justifyContent:"center"}}>
              <button onClick={()=>setRunning(r=>!r)} style={{padding:"12px 32px",borderRadius:10,border:`1px solid ${running?"#ef4444":POMO_MODES[modeIdx].color}`,background:running?"#ef444422":POMO_MODES[modeIdx].color,color:running?"#fca5a5":"#fff",fontSize:16,fontWeight:700,cursor:"pointer"}}>{running?"⏸ Pause":"▶ Start"}</button>
              <button onClick={()=>{setRunning(false);setTimeLeft(POMO_MODES[modeIdx].sec);}} style={{padding:"12px 18px",borderRadius:10,border:"1px solid #334155",background:"#1e293b",color:"#94a3b8",fontSize:16,cursor:"pointer"}}>↺</button>
            </div>
            <div style={{marginTop:20,background:"#1e293b",borderRadius:10,padding:14,border:"1px solid #334155"}}>
              <div style={{fontSize:13,color:"#64748b",marginBottom:6}}>Pomodoros Today</div>
              <div style={{display:"flex",gap:6,justifyContent:"center",flexWrap:"wrap"}}>
                {Array.from({length:Math.max(pomodoros,4)},(_,i)=>(
                  <span key={i} style={{fontSize:22}}>{i<pomodoros?"🍅":"⭕"}</span>
                ))}
              </div>
              <div style={{marginTop:8,fontSize:12,color:"#6366f1",fontWeight:600}}>{pomodoros} completed · ~{pomodoros*25} min focused</div>
            </div>
            <div style={{marginTop:12,background:"#1e293b",borderRadius:10,padding:12,border:"1px solid #334155",fontSize:12,color:"#64748b",textAlign:"left"}}>
              <div style={{color:"#a5b4fc",fontWeight:600,marginBottom:6}}>💡 Suggested Routine</div>
              <div>🍅 Pomo 1–2: Solve Q1–Q3</div>
              <div style={{marginTop:4}}>☕ Short Break (5 min)</div>
              <div style={{marginTop:4}}>🍅 Pomo 3–4: Solve Q4–Q6</div>
              <div style={{marginTop:4}}>🌿 Long Break after 4 pomos</div>
            </div>
          </div>
        )}

        {/* STATS */}
        {tab==="stats" && (
          <div>
            <div style={{fontWeight:700,fontSize:17,marginBottom:14}}>Your Progress</div>
            {/* Overall bar */}
            <div style={{background:"#1e293b",borderRadius:10,padding:16,border:"1px solid #334155",marginBottom:12}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                <span style={{fontSize:13,color:"#94a3b8"}}>Overall</span>
                <span style={{fontSize:13,fontWeight:700,color:"#6366f1"}}>{totalSolved} / 250</span>
              </div>
              <div style={{height:8,background:"#0f172a",borderRadius:4,overflow:"hidden"}}>
                <div style={{height:"100%",width:`${(totalSolved/250)*100}%`,background:"linear-gradient(90deg,#6366f1,#8b5cf6)",borderRadius:4,transition:"width 0.3s"}}/>
              </div>
              <div style={{marginTop:8,fontSize:11,color:"#64748b"}}>{Math.round((totalSolved/250)*100)}% complete</div>
            </div>
            {[
              ["Days Elapsed", `${today} / ${TOTAL_DAYS}`],
              ["On Track", totalSolved >= today*6 ? "✅ Yes!" : "⚠️ Need to catch up"],
              ["Today's Progress", `${SCHEDULE[today]?.questions.filter(q=>completed[q.id]).length||0} / 6`],
              ["Est. Finish", (() => { const d = new Date(); d.setDate(d.getDate()+Math.ceil((250-totalSolved)/6)); return d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}); })()],
            ].map(([k,v])=>(
              <div key={k} style={{display:"flex",justifyContent:"space-between",padding:"10px 0",borderBottom:"1px solid #1e293b",fontSize:13}}>
                <span style={{color:"#64748b"}}>{k}</span>
                <span style={{color:"#e2e8f0",fontWeight:600}}>{v}</span>
              </div>
            ))}
            {/* Per-topic progress */}
            <div style={{fontWeight:700,fontSize:15,margin:"20px 0 10px"}}>By Topic</div>
            {TOPICS.map(t => {
              const days = TOPIC_DAYS[t.name] ? [...TOPIC_DAYS[t.name]].sort((a,b)=>a-b) : [];
              const topicQIds = days.flatMap(d => (SCHEDULE[d]?.questions||[]).filter(q=>q.topic===t.name).map(q=>q.id));
              const solvedCount = topicQIds.filter(id=>completed[id]).length;
              return (
                <div key={t.name} style={{background:"#1e293b",border:"1px solid #334155",borderRadius:10,padding:"10px 14px",marginBottom:8}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                    <span style={{fontSize:13,color:"#fff",fontWeight:600}}>{t.name}</span>
                    <span style={{fontSize:12,color:t.color,fontWeight:700}}>{solvedCount}/{t.count}</span>
                  </div>
                  <div style={{height:4,background:"#0f172a",borderRadius:4,overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${(solvedCount/t.count)*100}%`,background:t.color,borderRadius:4}}/>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
